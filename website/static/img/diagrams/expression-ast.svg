<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" fill="none">
  <style>
    text { font-family: 'Inter', 'Geist', system-ui, sans-serif; }
    .title { font-size: 14px; fill: #09090b; font-weight: 600; }
    .cat { font-size: 10px; fill: #71717a; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
    .mono { font-family: 'Geist Mono', 'JetBrains Mono', monospace; font-size: 10px; fill: #52525b; }
    .node { stroke: #e4e4e7; stroke-width: 1; rx: 6; fill: white; }
    .node-root { stroke: #09090b; stroke-width: 1.5; rx: 8; fill: #fafafa; }
    .group { stroke: #e4e4e7; stroke-width: 1; rx: 10; fill: none; stroke-dasharray: 5 3; }
    .line { stroke: #d4d4d8; stroke-width: 1; }
    @media (prefers-color-scheme: dark) {
      .title { fill: #fafafa; } .cat { fill: #a1a1aa; } .mono { fill: #a1a1aa; }
      .node { stroke: #27272a; fill: #18181b; } .node-root { stroke: #fafafa; fill: #27272a; }
      .group { stroke: #27272a; } .line { stroke: #3f3f46; }
    }
  </style>

  <!-- Root -->
  <rect x="330" y="10" width="140" height="36" class="node-root"/>
  <text x="400" y="33" text-anchor="middle" class="title">Expr</text>

  <!-- Lines from root -->
  <line x1="350" y1="46" x2="100" y2="75" class="line"/>
  <line x1="380" y1="46" x2="310" y2="75" class="line"/>
  <line x1="400" y1="46" x2="500" y2="75" class="line"/>
  <line x1="440" y1="46" x2="700" y2="75" class="line"/>

  <!-- Group: Literals -->
  <rect x="10" y="75" width="180" height="160" class="group"/>
  <text x="100" y="95" text-anchor="middle" class="cat">Literals &amp; Refs</text>
  <rect x="25" y="105" width="150" height="22" class="node"/><text x="100" y="121" text-anchor="middle" class="mono">Literal(String|Int|Float|Bool|Null)</text>
  <rect x="25" y="133" width="150" height="22" class="node"/><text x="100" y="149" text-anchor="middle" class="mono">ColumnRef { table?, column }</text>
  <rect x="25" y="161" width="150" height="22" class="node"/><text x="100" y="177" text-anchor="middle" class="mono">Wildcard / QualifiedWildcard</text>
  <rect x="25" y="189" width="150" height="22" class="node"/><text x="100" y="205" text-anchor="middle" class="mono">TypedLiteral / ComplexLiteral</text>

  <!-- Group: Operators -->
  <rect x="210" y="75" width="200" height="160" class="group"/>
  <text x="310" y="95" text-anchor="middle" class="cat">Operators</text>
  <rect x="225" y="105" width="170" height="22" class="node"/><text x="310" y="121" text-anchor="middle" class="mono">BinaryOp { +  -  *  /  %  =  !=  &lt;  &gt; }</text>
  <rect x="225" y="133" width="170" height="22" class="node"/><text x="310" y="149" text-anchor="middle" class="mono">UnaryOp { Neg  Not }</text>
  <rect x="225" y="161" width="170" height="22" class="node"/><text x="310" y="177" text-anchor="middle" class="mono">NullSafeEq { &lt;=&gt; }</text>
  <rect x="225" y="189" width="170" height="22" class="node"/><text x="310" y="205" text-anchor="middle" class="mono">Concat { || }</text>

  <!-- Group: Predicates -->
  <rect x="430" y="75" width="170" height="160" class="group"/>
  <text x="515" y="95" text-anchor="middle" class="cat">Predicates</text>
  <rect x="445" y="105" width="140" height="22" class="node"/><text x="515" y="121" text-anchor="middle" class="mono">IsNull { negated }</text>
  <rect x="445" y="133" width="140" height="22" class="node"/><text x="515" y="149" text-anchor="middle" class="mono">InList { negated }</text>
  <rect x="445" y="161" width="140" height="22" class="node"/><text x="515" y="177" text-anchor="middle" class="mono">Between { low, high }</text>
  <rect x="445" y="189" width="140" height="22" class="node"/><text x="515" y="205" text-anchor="middle" class="mono">Like / RLike { pattern }</text>

  <!-- Group: Advanced -->
  <rect x="620" y="75" width="170" height="160" class="group"/>
  <text x="705" y="95" text-anchor="middle" class="cat">Advanced</text>
  <rect x="635" y="105" width="140" height="22" class="node"/><text x="705" y="121" text-anchor="middle" class="mono">FunctionCall { distinct }</text>
  <rect x="635" y="133" width="140" height="22" class="node"/><text x="705" y="149" text-anchor="middle" class="mono">Case { when, else }</text>
  <rect x="635" y="161" width="140" height="22" class="node"/><text x="705" y="177" text-anchor="middle" class="mono">Cast / TryCast</text>
  <rect x="635" y="189" width="140" height="22" class="node"/><text x="705" y="205" text-anchor="middle" class="mono">Alias { expr, alias }</text>

  <!-- v3 Features -->
  <line x1="400" y1="46" x2="400" y2="270" class="line"/>
  <rect x="80" y="270" width="640" height="110" class="group"/>
  <text x="400" y="292" text-anchor="middle" class="cat">v3.0 Expression Features</text>

  <rect x="95" y="305" width="130" height="28" class="node"/><text x="160" y="324" text-anchor="middle" class="mono">WindowExpr { OVER }</text>
  <rect x="95" y="340" width="130" height="28" class="node"/><text x="160" y="359" text-anchor="middle" class="mono">Lambda { x -&gt; expr }</text>

  <rect x="240" y="305" width="130" height="28" class="node"/><text x="305" y="324" text-anchor="middle" class="mono">NamedArg { k =&gt; v }</text>
  <rect x="240" y="340" width="130" height="28" class="node"/><text x="305" y="359" text-anchor="middle" class="mono">FieldAccess { .field }</text>

  <rect x="385" y="305" width="140" height="28" class="node"/><text x="455" y="324" text-anchor="middle" class="mono">Subscript { expr[key] }</text>
  <rect x="385" y="340" width="140" height="28" class="node"/><text x="455" y="359" text-anchor="middle" class="mono">TypedLiteral { DATE '...' }</text>

  <rect x="540" y="305" width="165" height="28" class="node"/><text x="622" y="324" text-anchor="middle" class="mono">ComplexLiteral { ARRAY() }</text>
  <rect x="540" y="340" width="165" height="28" class="node"/><text x="622" y="359" text-anchor="middle" class="mono">QualifiedWildcard { t.* }</text>

  <!-- Footer -->
  <text x="400" y="420" text-anchor="middle" class="cat">27 Expr variants · 16 BinaryOp · 5 Literal types</text>
</svg>
