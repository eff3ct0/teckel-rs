<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" fill="none">
  <style>
    text { font-family: 'Inter', 'Geist', system-ui, sans-serif; }
    .label { font-size: 13px; fill: #71717a; font-weight: 500; }
    .title { font-size: 15px; fill: #09090b; font-weight: 600; }
    .mono { font-family: 'Geist Mono', 'JetBrains Mono', monospace; font-size: 12px; fill: #52525b; }
    .box { stroke: #e4e4e7; stroke-width: 1; rx: 10; fill: white; }
    .box-accent { stroke: #d4d4d8; stroke-width: 1; rx: 8; fill: #fafafa; }
    .arrow { stroke: #a1a1aa; stroke-width: 1.5; marker-end: url(#arrowhead); }
    .dashed { stroke-dasharray: 6 4; }
    @media (prefers-color-scheme: dark) {
      .title { fill: #fafafa; }
      .label { fill: #a1a1aa; }
      .mono { fill: #a1a1aa; }
      .box { stroke: #27272a; fill: #18181b; }
      .box-accent { stroke: #3f3f46; fill: #27272a; }
      .arrow { stroke: #52525b; }
    }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#a1a1aa" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Input -->
  <rect x="20" y="130" width="120" height="60" class="box-accent"/>
  <text x="80" y="155" text-anchor="middle" class="label">YAML Document</text>
  <text x="80" y="172" text-anchor="middle" class="mono">version: "3.0"</text>

  <!-- Arrow -->
  <line x1="140" y1="160" x2="180" y2="160" class="arrow"/>

  <!-- teckel-parser box -->
  <rect x="180" y="40" width="300" height="240" class="box"/>
  <text x="330" y="68" text-anchor="middle" class="title">teckel-parser</text>

  <!-- Pipeline steps -->
  <rect x="200" y="85" width="260" height="32" class="box-accent"/>
  <text x="330" y="106" text-anchor="middle" class="mono">1. Serde deserialization</text>

  <rect x="200" y="125" width="260" height="32" class="box-accent"/>
  <text x="330" y="146" text-anchor="middle" class="mono">2. Variable substitution</text>

  <rect x="200" y="165" width="260" height="32" class="box-accent"/>
  <text x="330" y="186" text-anchor="middle" class="mono">3. Secret resolution</text>

  <rect x="200" y="205" width="260" height="32" class="box-accent"/>
  <text x="330" y="226" text-anchor="middle" class="mono">4. Rewrite + Validate</text>

  <!-- Arrow -->
  <line x1="480" y1="160" x2="520" y2="160" class="arrow"/>

  <!-- teckel-model box -->
  <rect x="520" y="60" width="180" height="200" class="box"/>
  <text x="610" y="88" text-anchor="middle" class="title">teckel-model</text>

  <rect x="540" y="105" width="140" height="28" class="box-accent"/>
  <text x="610" y="124" text-anchor="middle" class="mono">Asset</text>

  <rect x="540" y="141" width="140" height="28" class="box-accent"/>
  <text x="610" y="160" text-anchor="middle" class="mono">Source (45 variants)</text>

  <rect x="540" y="177" width="140" height="28" class="box-accent"/>
  <text x="610" y="196" text-anchor="middle" class="mono">Pipeline</text>

  <rect x="540" y="213" width="140" height="28" class="box-accent"/>
  <text x="610" y="232" text-anchor="middle" class="mono">TeckelDataType</text>
</svg>
